<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Water Main Grille | Wadsworth's Breakfast & Lunch Spot</title>
    <meta
      name="description"
      content="The Water Main Grille, a family-run breakfast & lunch spot in the historic south end of Wadsworth, OH. Homemade food, generous portions, honest prices. Open Tue–Sat 6am–2pm. Call (330) 331-7757." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#15110e" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet" />
    <!--SEO_HEAD-->
    <!-- Gate scroll-reveal styles on JS so no-JS / failed-bundle visitors see all content. -->
    <script>
      document.documentElement.classList.add('reveal-ready')
    </script>
  </head>
  <body>
    <!-- Hidden static form so Netlify detects it (and its fields) at build time.
         The live React form (src/pages/Contact.tsx) posts to this name. -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
    </form>
    <!-- Job application form (src/pages/Careers.tsx); multipart so the resume file uploads. -->
    <form name="application" netlify netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="position" />
      <input type="text" name="availability" />
      <textarea name="experience"></textarea>
      <input type="file" name="resume" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
